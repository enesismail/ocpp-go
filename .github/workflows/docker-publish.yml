name: Publish examples
on:
  # Disabled on this fork: these steps push example images to the upstream
  # ldonini/ DockerHub namespace and require DOCKER_USERNAME/DOCKER_PASSWORD
  # secrets the fork doesn't have, so the job failed on every master push.
  # Kept as workflow_dispatch only (no automatic triggers); to re-enable,
  # restore the `push` trigger and add the DockerHub secrets.
  workflow_dispatch:
jobs:
  publish_latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Central System 1.6 example
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ldonini/ocpp1.6-central-system:latest
          file: example/1.6/cs/Dockerfile
          platforms: linux/amd64,linux/arm64
          context: .
      - name: Build Charge Point 1.6 example
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ldonini/ocpp1.6-charge-point:latest
          file: example/1.6/cp/Dockerfile
          platforms: linux/amd64,linux/arm64
          context: .
      - name: Build CSMS 2.0.1 example
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ldonini/ocpp2.0.1-csms:latest
          file: example/2.0.1/csms/Dockerfile
          platforms: linux/amd64,linux/arm64
          context: .
      - name: Build Charging Station 2.0.1 example
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ldonini/ocpp2.0.1-charging-station:latest
          file: example/2.0.1/chargingstation/Dockerfile
          platforms: linux/amd64,linux/arm64
          context: .
